<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진짜 vs 가짜? 뉴스 판별 게임</title>
    <style>
        :root {
            --true-color: #2ecc71;
            --fake-color: #e74c3c;
            --bg-color: #f5f6fa;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            width: 100%;
            max-width: 600px; /* 카드 크기를 고려하여 넓게 조정 */
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* 카드 스타일 */
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 25px;
            margin-bottom: 30px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* 이미지가 위에서 시작하도록 */
            align-items: center;
            transition: background-color 0.4s ease, transform 0.4s ease;
        }

        .card img {
            width: 100%; /* 너비는 부모 요소에 맞춤 */
            max-height: 400px; /* 너무 길어지지 않도록 최대 높이 설정 */
            object-fit: contain; /* 사진 비율 유지, 잘리지 않게 조정 */
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .headline {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2c3e50;
            word-break: keep-all;
            line-height: 1.4;
        }

        /* 버튼 스타일 */
        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            border: none;
            border-radius: 50px;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-true { background-color: var(--true-color); }
        .btn-fake { background-color: var(--fake-color); }

        /* 결과 및 해설 피드백 */
        .feedback-area {
            margin-top: 20px;
            min-height: 80px;
        }

        .result-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .reason-text {
            font-size: 1rem;
            color: #555;
            line-height: 1.5;
            word-break: keep-all;
        }

        /* 넥스트 버튼 */
        .btn-next {
            background-color: #34495e;
            padding: 10px 25px;
            font-size: 0.95rem;
            margin-top: 15px;
        }

        /* 정답/오답 시 카드 배경색 변화 */
        .card.correct { background-color: #e8f8f5; border: 3px solid var(--true-color); box-sizing: border-box; }
        .card.wrong { background-color: #fceae9; border: 3px solid var(--fake-color); box-sizing: border-box; }

        /* 최종 점수 화면 */
        .score-board h2 { color: #2c3e50; font-size: 2rem; }
        .score-text { font-size: 3rem; font-weight: bold; color: #3498db; margin: 20px 0; }
        .btn-restart { background-color: #3498db; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="game-play">
            <div class="card" id="news-card">
                </div>

            <div class="btn-container" id="choice-buttons">
                <button class="btn-true" onclick="submitAnswer(false)">진짜</button>
                <button class="btn-fake" onclick="submitAnswer(true)">가짜</button>
            </div>

            <div class="feedback-area">
                <div id="result-message" class="result-text hidden"></div>
                <div id="reason-message" class="reason-text hidden"></div>
                <button id="next-button" class="btn-next hidden" onclick="nextCard()">다음 문제</button>
            </div>
        </div>

        <div id="game-result" class="score-board hidden">
            <h2>게임 종료!</h2>
            <div class="score-text"><span id="score">0</span> / <span id="total">0</span></div>
            <p>뉴스를 구별하는 안목이 훌륭합니다!</p>
            <button class="btn-restart" onclick="restartGame()">다시 도전하기</button>
        </div>
    </div>

    <script>
        // 요청해주신 데이터 셋 (JSON 배열 형태)
        const quizData = [
            {
                "headline": "용암 한번 먹어보겠습니다",
                "isFake": true,
                "reason": "AI를 이용해 용암을 먹는 것 처럼 구현해 낸 가짜 사진입니다.",
                "image": "https://img.danawa.com/prod_img/500000/039/532/img/14532039_1.jpg" // 이미지 URL 예시 (용암 먹방 사진은 찾기 어려움)
            },
            {
                "headline": "한강에서 괴물 발견...?",
                "isFake": true,
                "reason": "AI를 이용해 구현해 낸 가짜 사진입니다.",
                "image": "https://img.danawa.com/prod_img/500000/017/632/img/12632017_1.jpg" // 이미지 URL 예시 (한강 괴물 사진은 찾기 어려움)
            },
            {
                "headline": "다양한 인종의 사람들 사진(1)",
                "isFake": false,
                "reason": "진짜 사람들의 얼굴을 찍은 사진입니다",
                "image": "https://img.danawa.com/prod_img/500000/027/632/img/12632027_1.jpg" // 이미지 URL 예시
            },
            {
                "headline": "다양한 인종의 사람들 사진(2)?",
                "isFake": true,
                "reason": "AI를 이용해 구현해 낸 가짜 사진입니다.",
                "image": "https://img.danawa.com/prod_img/500000/037/632/img/12632037_1.jpg" // 이미지 URL 예시
            }
        ];

        let currentIndex = 0;
        let score = 0;

        const cardEl = document.getElementById('news-card');
        const choiceBtns = document.getElementById('choice-buttons');
        const resultMsg = document.getElementById('result-message');
        const reasonMsg = document.getElementById('reason-message');
        const nextBtn = document.getElementById('next-button');
        
        const gamePlaySection = document.getElementById('game-play');
        const gameResultSection = document.getElementById('game-result');
        const scoreEl = document.getElementById('score');
        const totalEl = document.getElementById('total');

        // 게임 초기화 및 카드 렌더링
        function loadCard() {
            // 초기화
            cardEl.className = 'card';
            resultMsg.classList.add('hidden');
            reasonMsg.classList.add('hidden');
            nextBtn.classList.add('hidden');
            choiceBtns.classList.remove('hidden');

            const currentQuiz = quizData[currentIndex];
            
            // 카드 내용 구성
            let cardContent = '';
            if (currentQuiz.image) {
                cardContent += `<img src="${currentQuiz.image}" alt="뉴스 이미지" onerror="this.style.display='none';">`;
            }
            cardContent += `<div class="headline">${currentQuiz.headline}</div>`;
            
            cardEl.innerHTML = cardContent;
        }

        // 정답 선택 처리 (userGuess: 사용자가 '가짜(true)'를 고르면 true, '진짜(false)'를 고르면 false)
        function submitAnswer(userGuess) {
            const currentQuiz = quizData[currentIndex];
            choiceBtns.classList.add('hidden'); // 답변 선택 후 버튼 숨김

            // 정답 판별 (데이터의 isFake 값과 사용자의 선택을 비교)
            if (userGuess === currentQuiz.isFake) {
                score++;
                cardEl.classList.add('correct');
                resultMsg.innerText = '정답입니다! 🎉';
                resultMsg.style.color = 'var(--true-color)';
            } else {
                cardEl.classList.add('wrong');
                resultMsg.innerText = '틀렸습니다! 😢';
                resultMsg.style.color = 'var(--fake-color)';
            }

            // 해설 노출
            reasonMsg.innerText = currentQuiz.reason;
            resultMsg.classList.remove('hidden');
            reasonMsg.classList.remove('hidden');
            nextBtn.classList.remove('hidden');
        }

        // 다음 카드로 이동
        function nextCard() {
            currentIndex++;
            if (currentIndex < quizData.length) {
                loadCard();
            } else {
                showResult();
            }
        }

        // 최종 결과 화면 표시
        function showResult() {
            gamePlaySection.classList.add('hidden');
            gameResultSection.classList.remove('hidden');
            scoreEl.innerText = score;
            totalEl.innerText = quizData.length;
        }

        // 게임 재시작
        function restartGame() {
            currentIndex = 0;
            score = 0;
            gameResultSection.classList.add('hidden');
            gamePlaySection.classList.remove('hidden');
            loadCard();
        }

        // 최초 실행
        loadCard();
    </script>
</body>
</html>
