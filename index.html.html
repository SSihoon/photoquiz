<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진짜 vs 가짜? 뉴스 판별 게임</title>
    <style>
        :root {
            --true-color: #2ecc71;
            --fake-color: #e74c3c;
            --bg-color: #f5f6fa;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .game-container {
            width: 100%;
            max-width: 500px; /* 고등학생들이 모바일/PC 어디서나 보기 좋은 최적의 너비 */
            text-align: center;
        }

        /* 카드 스타일: 사진 크기에 따라 높이가 유연하게 늘어남 */
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: background-color 0.4s ease, border 0.2s ease;
            border: 3px solid transparent;
            box-sizing: border-box;
        }

        /* 사진 원본 비율 유지 가이드라인 */
        .card img {
            width: 100%;
            height: auto; /* 비율 절대 깨지지 않고 원본대로 출력 */
            max-height: 65vh; /* 화면을 너무 벗어나지 않도록 최대 높이 제한 */
            object-fit: contain; /* 잘리는 부분 없이 전체 사진 다 보여주기 */
            border-radius: 12px;
            margin-bottom: 20px;
            display: block;
        }

        .headline {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2c3e50;
            word-break: keep-all;
            line-height: 1.4;
            width: 100%;
        }

        /* 버튼 스타일 */
        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-true { background-color: var(--true-color); }
        .btn-fake { background-color: var(--fake-color); }

        /* 결과 및 해설 피드백 */
        .feedback-area {
            margin-top: 20px;
            min-height: 90px;
        }

        .result-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .reason-text {
            font-size: 1rem;
            color: #555;
            line-height: 1.5;
            word-break: keep-all;
            background: rgba(0,0,0,0.03);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        /* 넥스트 버튼 */
        .btn-next {
            background-color: #34495e;
            padding: 10px 30px;
            font-size: 0.95rem;
            border-radius: 8px;
        }

        /* 정답/오답 시 피드백 스타일 */
        .card.correct { background-color: #e8f8f5; border-color: var(--true-color); }
        .card.wrong { background-color: #fceae9; border-color: var(--fake-color); }

        /* 최종 점수 화면 */
        .score-board h2 { color: #2c3e50; font-size: 2rem; margin-top: 0; }
        .score-text { font-size: 3.5rem; font-weight: bold; color: #3498db; margin: 20px 0; }
        .btn-restart { background-color: #3498db; border-radius: 10px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="game-play">
            <div class="card" id="news-card">
                </div>

            <div class="btn-container" id="choice-buttons">
                <button class="btn-true" onclick="submitAnswer(false)">진짜</button>
                <button class="btn-fake" onclick="submitAnswer(true)">가짜</button>
            </div>

            <div class="feedback-area">
                <div id="result-message" class="result-text hidden"></div>
                <div id="reason-message" class="reason-text hidden"></div>
                <button id="next-button" class="btn-next hidden" onclick="nextCard()">다음 문제</button>
            </div>
        </div>

        <div id="game-result" class="score-board hidden">
            <h2>게임 종료!</h2>
            <div class="score-text"><span id="score">0</span> / <span id="total">0</span></div>
            <p>뉴스를 구별하는 안목이 훌륭합니다!</p>
            <button class="btn-restart" onclick="restartGame()">다시 도전하기</button>
        </div>
    </div>

    <script>
        // 요구사항에 맞춰 로컬 파일명으로 세팅 완료된 데이터셋
        const quizData = [
            {
                "headline": "용암 한번 먹어보겠습니다",
                "isFake": true,
                "reason": "AI를 이용해 용암을 먹는 것 처럼 구현해 낸 가짜 사진입니다.",
                "image": "용암먹방image.png"
            },
            {
                "headline": "한강에서 괴물 발견...?",
                "isFake": true,
                "reason": "AI를 이용해 구현해 낸 가짜 사진입니다.",
                "image": "한강괴물image.png"
            },
            {
                "headline": "다양한 인종의 사람들 사진(1)",
                "isFake": false,
                "reason": "진짜 사람들의 얼굴을 찍은 사진입니다",
                "image": "진짜사람들사진.png"
            },
            {
                "headline": "다양한 인종의 사람들 사진(2)?",
                "isFake": true,
                "reason": "AI를 이용해 구현해 낸 가짜 사진입니다.",
                "image": "가짜사람들사진.png"
            }
        ];

        let currentIndex = 0;
        let score = 0;

        const cardEl = document.getElementById('news-card');
        const choiceBtns = document.getElementById('choice-buttons');
        const resultMsg = document.getElementById('result-message');
        const reasonMsg = document.getElementById('reason-message');
        const nextBtn = document.getElementById('next-button');
        
        const gamePlaySection = document.getElementById('game-play');
        const gameResultSection = document.getElementById('game-result');
        const scoreEl = document.getElementById('score');
        const totalEl = document.getElementById('total');

        // 카드 렌더링 함수
        function loadCard() {
            cardEl.className = 'card';
            resultMsg.classList.add('hidden');
            reasonMsg.classList.add('hidden');
            nextBtn.classList.add('hidden');
            choiceBtns.classList.remove('hidden');

            const currentQuiz = quizData[currentIndex];
            
            let cardContent = '';
            // image 필드가 존재하고 null이 아닐 때만 img 태그 생성
            if (currentQuiz.image) {
                cardContent += `<img src="${currentQuiz.image}" alt="뉴스 사진">`;
            }
            cardContent += `<div class="headline">${currentQuiz.headline}</div>`;
            
            cardEl.innerHTML = cardContent;
        }

        // 정답 제출
        function submitAnswer(userGuess) {
            const currentQuiz = quizData[currentIndex];
            choiceBtns.classList.add('hidden');

            if (userGuess === currentQuiz.isFake) {
                score++;
                cardEl.classList.add('correct');
                resultMsg.innerText = '정답입니다! 🎉';
                resultMsg.style.color = 'var(--true-color)';
            } else {
                cardEl.classList.add('wrong');
                resultMsg.innerText = '틀렸습니다! 😢';
                resultMsg.style.color = 'var(--fake-color)';
            }

            reasonMsg.innerText = currentQuiz.reason;
            resultMsg.classList.remove('hidden');
            reasonMsg.classList.remove('hidden');
            nextBtn.classList.remove('hidden');
        }

        // 다음 단계
        function nextCard() {
            currentIndex++;
            if (currentIndex < quizData.length) {
                loadCard();
            } else {
                showResult();
            }
        }

        // 결과창
        function showResult() {
            gamePlaySection.classList.add('hidden');
            gameResultSection.classList.remove('hidden');
            scoreEl.innerText = score;
            totalEl.innerText = quizData.length;
        }

        // 재시작
        function restartGame() {
            currentIndex = 0;
            score = 0;
            gameResultSection.classList.add('hidden');
            gamePlaySection.classList.remove('hidden');
            loadCard();
        }

        // 첫 로드 실행
        loadCard();
    </script>
</body>
</html>
